<div id="a" class="row">

 <div id="b" class="col" style="margin-left: 30px;">

  <label for="exampleInputPassword3" class="form-label">nurse_id</label>
  <input type="number" name="nurse_id" class="form-control" id="exampleInputPassword3">
  <label for="exampleInputEmail1" class="form-label">Email address</label>
  <input type="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Example@gmail.com">
  <div id="emailHelp" class="form-text" style="color:black; font-size: 14px;">We'll never share your email with anyone else.</div>

  <label for="exampleInputPassword7" class="form-label">Upload Certificate</label>
  <input type="file" name="certificate" class="form-control" id="exampleInputPassword7">
  <br>
  <label for="exampleInputPassword7" class="form-label">Upload Profile picture</label>
  <input type="file" name="profile" class="form-control" id="exampleInputPassword7">
  <label for="exampleInputPassword6" class="form-label">Password</label>
  <input type="password" name="password" class="form-control" id="exampleInputPassword6">
  
  
  
 </div>
 <div id="c" class="col">
  <br>
  <label for="exampleInputPassword1" class="form-label">Username</label>
  <input type="text" name="username" class="form-control" id="exampleInputPassword1">
  
  <label for="exampleInputPassword3" class="form-label">Phone no.</label>
  <input type="number" name="phone" class="form-control" id="exampleInputPassword3">
  
  <label for="exampleInputPassword4" class="form-label">Address</label>
  <input type="text" name="address" class="form-control" id="exampleInputPassword4">
  
  <label for="exampleInputPassword4" class="form-label">Registration ID</label>
  <input type="text" name="reg_id" class="form-control" id="exampleInputPassword4">
  <label for="exampleInputPassword4" class="form-label">status</label>
  <input type="text" name="status" class="form-control" id="exampleInputPassword4">
  <label for="exampleInputPassword7" class="form-label">Confirm Password</label>
  <input type="password" name="cpassword" class="form-control" id="exampleInputPassword7">
 </div>
